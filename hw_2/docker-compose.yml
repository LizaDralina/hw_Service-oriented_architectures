services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"

  flyway:
    image: flyway/flyway:10
    depends_on:
      - db
    command: >
      -url=jdbc:postgresql://db:5432/marketplace
      -user=marketplace
      -password=marketplace
      -connectRetries=30
      migrate
    volumes:
      - ./flyway/sql:/flyway/sql

  app:
    build: .
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      DB_DSN: postgresql+psycopg://marketplace:marketplace@db:5432/marketplace
    ports:
      - "8080:8080"