openapi: 3.0.3
info:
  title: Marketplace API
  version: 1.0.0

paths:
  /products:
    post:
      summary: Create product
      operationId: createProduct
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error

    get:
      summary: List products with pagination and filtering
      operationId: listProducts
      tags: [Products]
      parameters:
        - name: page
          in: query
          description: Page number (starts from 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, ARCHIVED]
        - name: category
          in: query
          description: Filter by category (exact match)
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Page of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'

  /products/{id}:
    get:
      summary: Get product by ID
      operationId: getProductById
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Not found

    put:
      summary: Update product
      operationId: updateProduct
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error
        '404':
          description: Not found

    delete:
      summary: Soft delete product (set status ARCHIVED)
      operationId: archiveProduct
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Archived (status set to ARCHIVED)
        '404':
          description: Not found

components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]

    ProductCreate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        price:
          type: string
          format: decimal
          description: Price (> 0)
        stock:
          type: integer
          minimum: 0
        category:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/ProductStatus'

    ProductUpdate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        price:
          type: string
          format: decimal
          description: Price (> 0)
        stock:
          type: integer
          minimum: 0
        category:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/ProductStatus'

    ProductResponse:
      type: object
      required: [id, name, price, stock, category, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
          format: decimal
        stock:
          type: integer
        category:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductPageResponse:
      type: object
      required: [items, totalElements, page, size]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        totalElements:
          type: integer
          format: int64
          minimum: 0
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1

