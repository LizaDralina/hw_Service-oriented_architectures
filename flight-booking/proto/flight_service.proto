syntax = "proto3";

package flight;

import "google/protobuf/timestamp.proto";

enum FlightStatus {
  FLIGHT_STATUS_UNSPECIFIED = 0;
  SCHEDULED = 1;
  DEPARTED = 2;
  CANCELLED = 3;
  COMPLETED = 4;
}

enum ReservationStatus {
  RESERVATION_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  RELEASED = 2;
  EXPIRED = 3;
}

message Flight {
  string id = 1;
  string airline = 2;
  string flight_number = 3;
  string departure_airport = 4;
  string arrival_airport = 5;
  google.protobuf.Timestamp departure_time = 6;
  google.protobuf.Timestamp arrival_time = 7;
  int32 total_seats = 8;
  int32 available_seats = 9;
  double price = 10;
  FlightStatus status = 11;
}

message SeatReservation {
  string id = 1;
  string flight_id = 2;
  string booking_id = 3;
  int32 seat_count = 4;
  ReservationStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}

message SearchFlightsRequest {
  string departure_airport = 1;
  string arrival_airport = 2;
  google.protobuf.Timestamp departure_date_from = 3;
  google.protobuf.Timestamp departure_date_to = 4;
}

message SearchFlightsResponse {
  repeated Flight flights = 1;
}

message GetFlightRequest {
  string flight_id = 1;
}

message GetFlightResponse {
  Flight flight = 1;
}

message ReserveSeatsRequest {
  string flight_id = 1;
  string booking_id = 2;
  int32 seat_count = 3;
}

message ReserveSeatsResponse {
  SeatReservation reservation = 1;
  Flight flight = 2;
}

message ReleaseReservationRequest {
  string booking_id = 1;
}

message ReleaseReservationResponse {
  SeatReservation reservation = 1;
  Flight flight = 2;
}

service FlightService {
  rpc SearchFlights(SearchFlightsRequest) returns (SearchFlightsResponse);
  rpc GetFlight(GetFlightRequest) returns (GetFlightResponse);
  rpc ReserveSeats(ReserveSeatsRequest) returns (ReserveSeatsResponse);
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);
}
